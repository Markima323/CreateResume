spring:
  application:
    name: resume-generator
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/resume}
    username: ${DB_USER:resume}
    password: ${DB_PASSWORD:resume}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
management:
  endpoints:
    web:
      exposure:
        include: health,info
app:
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-3.5-flash}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
    store: false
    thinking-level: ${GEMINI_THINKING_LEVEL:medium}
  generation-dir: ${GENERATION_DIR:./data/generations}
  latex-template: ${LATEX_TEMPLATE:classpath:resume-template/base-resume.tex}
