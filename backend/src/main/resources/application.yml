spring:
  application:
    name: resume-generator
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/resume}
    username: ${DB_USER:resume}
    password: ${DB_PASSWORD:resume}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
management:
  endpoints:
    web:
      exposure:
        include: health,info
app:
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-5.4-mini}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    store: false
  generation-dir: ${GENERATION_DIR:./data/generations}
  latex-template: ${LATEX_TEMPLATE:classpath:resume-template/base-resume.tex}
