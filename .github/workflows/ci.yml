name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Test backend
        working-directory: backend
        run: mvn --batch-mode verify

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  compose:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose -f compose.yml config --quiet
      - name: Validate production Compose configuration
        env:
          POSTGRES_DB: resume
          POSTGRES_USER: resume
          POSTGRES_PASSWORD: ci-only-database-password
          GEMINI_API_KEY: ci-only-gemini-key
        run: docker compose -f compose.prod.yml config --quiet
